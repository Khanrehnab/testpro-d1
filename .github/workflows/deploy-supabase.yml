
name: Deploy Supabase Functions

# Trigger on push to main branch (change if needed)
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - uses: actions/checkout@v3

      # 2. Set up Node.js (required for Supabase CLI)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Install Supabase CLI locally
      - name: Install Supabase CLI
        run: npm install supabase --save-dev

      # 4. Deploy functions
      - name: Deploy Supabase Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase login --access-token $SUPABASE_ACCESS_TOKEN
          npx supabase functions deploy auth-login
          npx supabase functions deploy admin-import
          npx supabase functions deploy admin-user-manage
