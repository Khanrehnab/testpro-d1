<svg width="800" height="800" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

  <!-- Main body -->
  <rect x="15" y="10" width="70" height="75" rx="20" fill="#FAFAFA"/>

  <!-- Windshield -->
  <path d="M25 20 
           Q50 10, 75 20 
           L75 40 
           Q50 45, 25 40 Z"
        fill="#263238"/>

  <!-- Central headlight -->
  <circle cx="50" cy="48" r="4" fill="#FFD54F"/>
  <circle cx="50" cy="48" r="2" fill="#FFF176"/>

  <!-- Side headlights -->
  <circle cx="32" cy="52" r="2.5" fill="#FFD54F"/>
  <circle cx="68" cy="52" r="2.5" fill="#FFD54F"/>

  <!-- Orange accent -->
  <path d="M30 58 
           Q50 68, 70 58" 
        stroke="#FF6F00" stroke-width="4" fill="none"/>

  <!-- Lower grille -->
  <rect x="40" y="64" width="20" height="5" rx="2.5" fill="#CFD8DC"/>

  <!-- Cattle guard (pilot) -->
  <path d="M35 75 
           L50 85 
           L65 75 
           L60 75 
           L50 82 
           L40 75 Z"
        fill="#90A4AE"/>

  <!-- Shadow -->
  <ellipse cx="50" cy="92" rx="25" ry="4" fill="#BDBDBD" opacity="0.25"/>

</svg>
